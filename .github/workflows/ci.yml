name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: sudo apt-get update && sudo apt-get install -y zsh shellcheck gawk mawk

      - name: zsh syntax check
        run: |
          zsh -n zsh/hxp-lib.zsh
          zsh -n zsh/hxp-main.zsh
          zsh -n bin/hxp-compile

      - name: bash syntax check
        run: |
          for f in bin/hxp-jump bin/hxp-mdline bin/hxp-dual-panelify install.sh; do
            bash -n "$f"
          done

      - name: shellcheck
        run: shellcheck -S warning bin/hxp-jump bin/hxp-mdline bin/hxp-dual-panelify install.sh

      - name: parser tests (runs under gawk + mawk)
        run: zsh test/parse-test.zsh

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zsh pandoc texlive-xetex texlive-latex-extra latexmk inotify-tools

      - name: Install typst
        run: |
          asset=typst-x86_64-unknown-linux-musl
          curl -fsSL "https://github.com/typst/typst/releases/latest/download/${asset}.tar.xz" -o typst.tar.xz
          tar -xJf typst.tar.xz
          sudo install "${asset}/typst" /usr/local/bin/typst
          typst --version

      - name: smoke tests
        run: zsh test/smoke.zsh
